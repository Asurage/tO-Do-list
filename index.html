<!doctype html>
<html>
  <head>
    <title>tO_Do list</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h1>To_Do List</h1>

      <p class="menu-title">MENU</p>
      <ul>
        <li id="dashboard">Dashboard</li>
        <li id="today">Today</li>
        <li id="upcoming">Upcoming</li>
        <li id="important">Important</li>
      </ul>
    </div>

    <div class="main-content">
      <div class="header">
        <h2>Todays Task's</h2>
      </div>
      <input type="text" id="taskInput" placeholder="Enter task" />

      <label for="taskList">List</label>
      <select id="taskList">
        <option value="today">today</option>
        <option value="upcoming">upcoming</option>
      </select>

      <input type="checkbox" id="importantTask" />
      <label for="importantTask">Important</label>

      <button id="addBtn">Add Task</button>
      <p id="empty"></p>

      <div id="taskContainer"></div>

    <script src="script.js"></script>

</html>
